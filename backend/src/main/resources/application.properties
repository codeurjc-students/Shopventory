spring.application.name=shopventory

# Server
server.port=${PORT:8443}
spring.jackson.time-zone=Europe/Madrid
server.servlet.encoding.charset=UTF-8

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Database
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/shopventory}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true

# SSL
server.ssl.key-store=classpath:keystore.jks
server.ssl.key-store-password=${KEYSTORE_PASSWORD:password}
server.ssl.key-password=${KEYSTORE_PASSWORD:password}

# JWT
jwt.secret=${JWT_SECRET:shopventoryJwtSecret2024ChangeInProduction!}

# Application settings
app.stock.low-threshold=${STOCK_LOW_THRESHOLD:5}

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply.shopventory@gmail.com}
spring.mail.password=${MAIL_PASSWORD:qjbiqrekwfxalhdh}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email feature toggle
app.email.enabled=${MAIL_ENABLED:true}
app.email.from=${MAIL_USERNAME:noreply.shopventory@gmail.com}

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
