spring.application.name=shopventory

# Server
server.port=${PORT:8443}
spring.jackson.time-zone=Europe/Madrid
server.servlet.encoding.charset=UTF-8

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Database
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/shopventory}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true

# SSL
server.ssl.key-store=classpath:keystore.jks
server.ssl.key-store-password=${KEYSTORE_PASSWORD:password}
server.ssl.key-password=${KEYSTORE_PASSWORD:password}

# JWT
# DEV-ONLY fallback so the app boots locally. Any real deployment MUST override
# this with a strong random value via the JWT_SECRET environment variable
# (docker/.env / GitHub Actions secret). Never put a production secret here.
jwt.secret=${JWT_SECRET:dev-only-insecure-jwt-secret-change-me-via-env-var}

# Multipart uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application settings
app.stock.low-threshold=${STOCK_LOW_THRESHOLD:5}

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply.shopventory@gmail.com}
# The password is NEVER stored here. It is injected at runtime via the
# MAIL_PASSWORD environment variable (docker-compose / GitHub Actions). Empty
# default: if not provided, email sending fails gracefully (EmailService catches
# the error).
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email feature toggle
app.email.enabled=${MAIL_ENABLED:true}
app.email.from=${MAIL_USERNAME:noreply.shopventory@gmail.com}

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
