# Selenium profile: layered on top of application-test.properties (H2, mail
# dummy, jwt secret) and adds HTTPS so the Secure JWT cookies survive the
# browser round-trip. Uses the bundled self-signed keystore; the driver is
# configured to accept the insecure certificate.
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.jks
server.ssl.key-store-password=password
server.ssl.key-password=password
