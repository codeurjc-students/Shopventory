spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true
server.ssl.enabled=false
server.port=8080
# Must be >= 32 bytes for HS256 (jjwt rejects shorter keys with WeakKeyException).
jwt.secret=shopventory-test-jwt-secret-key-that-is-definitely-long-enough-for-hs256
app.stock.low-threshold=5

# Mail: dummy host so the JavaMailSender bean autoconfigures (EmailService needs
# it injected). Actual sending is disabled so tests never hit a real SMTP server.
spring.mail.host=localhost
spring.mail.port=587
app.email.enabled=false
