openapi: 3.1.0
info:
  title: Shopventory REST API
  description: |-
    REST API for Shopventory, an inventory management web application for small businesses. It exposes endpoints for authentication, products and stock movements, orders, providers, employees, user management and dashboard metrics.

    Authentication is based on JWT. After a successful login the access and refresh tokens are stored in HttpOnly cookies (`AuthToken` and `RefreshToken`); a `Bearer` token in the `Authorization` header is also accepted. Access is role-based (`ADMIN` and `USER`) and list endpoints are paginated.
  contact:
    name: Alberto — Shopventory (TFG)
  version: 1.0.0
servers:
- url: https://localhost:8443
  description: Local development server
security:
- cookieAuth: []
tags:
- name: Users
  description: User management endpoints (Admin only)
- name: Employees
  description: Employee management endpoints (Admin only)
- name: Products
  description: Product management endpoints
- name: Providers
  description: Supplier/provider management endpoints
- name: Dashboard
  description: Analytics and statistics endpoints
- name: Orders
  description: Sales and purchase order endpoints
- name: Authentication
  description: "Login, logout and registration endpoints"
paths:
  /api/users/{id}:
    get:
      tags:
      - Users
      summary: Get user by ID
      operationId: getById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponseDTO"
        "403":
          description: Admin role required
        "404":
          description: User not found
    put:
      tags:
      - Users
      summary: Update user
      operationId: update
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegistrationDTO"
        required: true
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponseDTO"
        "400":
          description: Invalid user data
        "403":
          description: Admin role required
        "404":
          description: User not found
    delete:
      tags:
      - Users
      summary: Delete user
      operationId: delete
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: User deleted
        "403":
          description: Admin role required
        "404":
          description: User not found
  /api/providers/{id}:
    get:
      tags:
      - Providers
      summary: Get provider by ID
      operationId: getById_1
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Provider found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Provider"
        "401":
          description: Not authenticated
        "404":
          description: Provider not found
    put:
      tags:
      - Providers
      summary: Update provider (Admin only)
      operationId: update_1
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderDTO"
        required: true
      responses:
        "200":
          description: Provider updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Provider"
        "400":
          description: Invalid provider data
        "403":
          description: Admin role required
        "404":
          description: Provider not found
    delete:
      tags:
      - Providers
      summary: Delete provider (Admin only)
      operationId: delete_1
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Provider deleted
        "403":
          description: Admin role required
        "404":
          description: Provider not found
  /api/products/{id}:
    get:
      tags:
      - Products
      summary: Get product by ID
      operationId: getById_2
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
    put:
      tags:
      - Products
      summary: Update product (Admin only)
      operationId: update_2
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductDTO"
        required: true
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Invalid product data
        "403":
          description: Admin role required
        "404":
          description: Product not found
    delete:
      tags:
      - Products
      summary: Delete product (Admin only)
      operationId: delete_2
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Product deleted
        "403":
          description: Admin role required
        "404":
          description: Product not found
  /api/products/{id}/image:
    get:
      tags:
      - Products
      summary: Get product image
      operationId: getImage
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Image returned
          content:
            image/jpeg: {}
        "404":
          description: Product or image not found
    put:
      tags:
      - Products
      summary: Upload or replace product image (Admin only)
      operationId: uploadImage
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      responses:
        "200":
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Invalid file
        "403":
          description: Admin role required
        "404":
          description: Product not found
    delete:
      tags:
      - Products
      summary: Delete product image (Admin only)
      operationId: deleteImage
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Image deleted
        "403":
          description: Admin role required
        "404":
          description: Product not found
  /api/employees/{id}:
    get:
      tags:
      - Employees
      summary: Get employee by ID
      operationId: getById_3
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Employee found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "403":
          description: Admin role required
        "404":
          description: Employee not found
    put:
      tags:
      - Employees
      summary: Update employee
      operationId: update_3
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeDTO"
        required: true
      responses:
        "200":
          description: Employee updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "400":
          description: Invalid employee data
        "403":
          description: Admin role required
        "404":
          description: Employee not found
    delete:
      tags:
      - Employees
      summary: Delete employee
      operationId: delete_3
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Employee deleted
        "403":
          description: Admin role required
        "404":
          description: Employee not found
  /api/users/{id}/enabled:
    post:
      tags:
      - Users
      summary: Enable or disable a user account
      operationId: setEnabled
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: value
        in: query
        required: true
        schema:
          type: boolean
      responses:
        "200":
          description: Account status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponseDTO"
        "403":
          description: Admin role required
        "404":
          description: User not found
  /api/users/{id}/approve:
    post:
      tags:
      - Users
      summary: Approve pending user registration
      operationId: approve
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: User approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponseDTO"
        "403":
          description: Admin role required
        "404":
          description: User not found
  /api/providers:
    get:
      tags:
      - Providers
      summary: List all providers paginated
      operationId: list
      parameters:
      - name: search
        in: query
        required: false
        schema:
          type: string
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Provider list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageResponse"
        "401":
          description: Not authenticated
    post:
      tags:
      - Providers
      summary: Create a new provider (Admin only)
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderDTO"
        required: true
      responses:
        "201":
          description: Provider created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Provider"
        "400":
          description: Invalid provider data
        "403":
          description: Admin role required
  /api/products:
    get:
      tags:
      - Products
      summary: "List all products paginated, optionally filtered by search, category\
        \ or provider"
      operationId: list_1
      parameters:
      - name: search
        in: query
        required: false
        schema:
          type: string
      - name: category
        in: query
        required: false
        schema:
          type: string
      - name: providerId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Product list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageResponse"
    post:
      tags:
      - Products
      summary: Create a new product (Admin only)
      operationId: create_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductDTO"
        required: true
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Invalid product data
        "403":
          description: Admin role required
        "409":
          description: SKU already exists
  /api/products/{id}/stock:
    post:
      tags:
      - Products
      summary: Manually adjust product stock
      operationId: updateStock
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockUpdateDTO"
        required: true
      responses:
        "200":
          description: "Stock updated, movement recorded"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovement"
        "400":
          description: Invalid quantity or insufficient stock
        "401":
          description: Not authenticated
        "404":
          description: Product not found
  /api/orders:
    get:
      tags:
      - Orders
      summary: "List all orders paginated, optionally filtered by type"
      operationId: list_2
      parameters:
      - name: type
        in: query
        required: false
        schema:
          type: string
          enum:
          - SALE
          - PURCHASE
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Order list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageResponse"
        "401":
          description: Not authenticated
    post:
      tags:
      - Orders
      summary: Create a new order
      operationId: create_2
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderDTO"
        required: true
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid order data or insufficient stock
        "401":
          description: Not authenticated
        "404":
          description: Product or provider not found
  /api/orders/{id}/deliver:
    post:
      tags:
      - Orders
      summary: Mark a confirmed order as delivered and set delivery date to today
        (Admin only)
      operationId: deliver
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Order marked as delivered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Order is not in CONFIRMED status
        "403":
          description: Admin role required
        "404":
          description: Order not found
  /api/orders/{id}/confirm:
    post:
      tags:
      - Orders
      summary: Confirm order and update stock automatically (Admin only)
      operationId: confirm
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Order confirmed and stock updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Order is not in PENDING status
        "403":
          description: Admin role required
        "404":
          description: Order not found
  /api/orders/{id}/cancel:
    post:
      tags:
      - Orders
      summary: Cancel an order
      operationId: cancel
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Order cannot be cancelled (already delivered)
        "401":
          description: Not authenticated
        "404":
          description: Order not found
  /api/employees:
    get:
      tags:
      - Employees
      summary: List all employees paginated
      operationId: list_3
      parameters:
      - name: search
        in: query
        required: false
        schema:
          type: string
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Employee list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageResponse"
        "403":
          description: Admin role required
    post:
      tags:
      - Employees
      summary: Create a new employee
      operationId: create_3
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeDTO"
        required: true
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "400":
          description: Invalid employee data
        "403":
          description: Admin role required
  /api/auth/register:
    post:
      tags:
      - Authentication
      summary: Register a new user account (pending admin approval)
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegistrationDTO"
        required: true
      responses:
        "201":
          description: "User registered, pending approval"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponseDTO"
        "400":
          description: Invalid registration data
        "409":
          description: Email already registered
  /api/auth/refresh:
    post:
      tags:
      - Authentication
      summary: Refresh access token using refresh token cookie
      operationId: refresh
      parameters:
      - name: RefreshToken
        in: cookie
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid or expired refresh token
  /api/auth/logout:
    post:
      tags:
      - Authentication
      summary: Logout and clear session cookies
      operationId: logout
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Not authenticated
  /api/auth/login:
    post:
      tags:
      - Authentication
      summary: Login with email and password
      operationId: login
      parameters:
      - name: AuthToken
        in: cookie
        required: false
        schema:
          type: string
      - name: RefreshToken
        in: cookie
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: "Login successful, tokens set in cookies"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials or account not approved
  /api/users:
    get:
      tags:
      - Users
      summary: List all users paginated
      operationId: list_4
      parameters:
      - name: search
        in: query
        required: false
        schema:
          type: string
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: User list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageResponse"
        "403":
          description: Admin role required
  /api/users/pending:
    get:
      tags:
      - Users
      summary: Get list of users pending approval
      operationId: pending
      responses:
        "200":
          description: Pending users list returned
          content:
            application/json:
              schema:
                type: string
        "403":
          description: Admin role required
  /api/products/{id}/stock-movements:
    get:
      tags:
      - Products
      summary: Get stock movement history for a product
      operationId: stockHistory
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Stock movement history returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageResponse"
        "404":
          description: Product not found
  /api/products/low-stock:
    get:
      tags:
      - Products
      summary: Get low-stock products
      operationId: lowStock
      parameters:
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Low-stock product list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageResponse"
  /api/orders/{id}:
    get:
      tags:
      - Orders
      summary: Get order by ID
      operationId: getById_4
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          description: Not authenticated
        "404":
          description: Order not found
    delete:
      tags:
      - Orders
      summary: Delete order (Admin only)
      operationId: delete_4
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Order deleted
        "403":
          description: Admin role required
        "404":
          description: Order not found
  /api/dashboard/stock-movements:
    get:
      tags:
      - Dashboard
      summary: Get all stock movements paginated
      operationId: stockMovements
      parameters:
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Stock movement list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageResponse"
        "401":
          description: Not authenticated
  /api/dashboard/stats:
    get:
      tags:
      - Dashboard
      summary: Get dashboard statistics summary
      operationId: stats
      responses:
        "200":
          description: Dashboard statistics returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStatsDTO"
        "401":
          description: Not authenticated
  /api/auth/me:
    get:
      tags:
      - Authentication
      summary: Get current authenticated user info
      operationId: me
      responses:
        "200":
          description: Current user data returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponseDTO"
        "401":
          description: Not authenticated
components:
  schemas:
    UserRegistrationDTO:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          maxLength: 2147483647
          minLength: 8
        name:
          type: string
        surname:
          type: string
        phone:
          type: string
      required:
      - email
      - name
      - password
      - surname
    UserResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        name:
          type: string
        surname:
          type: string
        phone:
          type: string
        roles:
          type: array
          items:
            type: string
        approved:
          type: boolean
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
    ProviderDTO:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        phoneNumber:
          type: string
        website:
          type: string
        contactPerson:
          type: string
        email:
          type: string
        types:
          type: array
          items:
            type: string
          uniqueItems: true
      required:
      - name
    Provider:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        address:
          type: string
        phoneNumber:
          type: string
        website:
          type: string
        contactPerson:
          type: string
        email:
          type: string
        types:
          type: array
          items:
            type: string
          uniqueItems: true
      required:
      - name
    ProductDTO:
      type: object
      properties:
        name:
          type: string
        sku:
          type: string
        description:
          type: string
        descriptionShort:
          type: string
        price:
          type: number
          minimum: 0.0
        stock:
          type: integer
          format: int32
          minimum: 0
        minStockThreshold:
          type: integer
          format: int32
          minimum: 0
        categories:
          type: array
          items:
            type: string
          uniqueItems: true
        providerIds:
          type: array
          items:
            type: integer
            format: int64
          uniqueItems: true
