<div class="container py-4" style="max-width:800px">
  <h2 class="mb-4">New Order</h2>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <label class="form-label">Order Type *</label>
        <select formControlName="type" class="form-select">
          <option value="SALE">Sale</option>
          <option value="PURCHASE">Purchase</option>
        </select>
      </div>

      <ng-container *ngIf="orderType === 'SALE'">
        <div class="col-md-4">
          <label class="form-label">Customer Name</label>
          <input formControlName="customerName" class="form-control" placeholder="Optional">
        </div>
        <div class="col-md-4">
          <label class="form-label">Customer Email</label>
          <input type="email" formControlName="customerEmail" class="form-control"
                 [class.is-invalid]="form.get('customerEmail')?.invalid && form.get('customerEmail')?.touched">
          <div class="invalid-feedback">Invalid email.</div>
        </div>
      </ng-container>

      <ng-container *ngIf="orderType === 'PURCHASE'">
        <div class="col-md-8">
          <label class="form-label">Provider</label>
          <select formControlName="providerId" class="form-select">
            <option [value]="null">-- Select provider --</option>
            <option *ngFor="let p of providers" [value]="p.id">{{ p.name }}</option>
          </select>
        </div>
      </ng-container>

      <div class="col-md-4">
        <label class="form-label">Delivery Date</label>
        <input type="date" formControlName="deliveryDate" class="form-control">
      </div>
      <div class="col-md-2">
        <label class="form-label">Discount (%)</label>
        <input type="number" formControlName="discount" class="form-control" min="0" max="100">
      </div>
      <div class="col-md-6">
        <label class="form-label">Notes</label>
        <input formControlName="notes" class="form-control" placeholder="Optional">
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h6 class="mb-0">Order Items</h6>
        <button type="button" class="btn btn-sm btn-outline-primary" (click)="addItem()">
          <i class="bi bi-plus-circle me-1"></i>Add Item
        </button>
      </div>
      <div class="card-body">
        <div formArrayName="items">
          <div *ngFor="let item of items.controls; let i = index" [formGroupName]="i"
               class="row g-2 align-items-end mb-2">
            <div class="col-md-8">
              <label class="form-label" *ngIf="i === 0">Product *</label>
              <select formControlName="productId" class="form-select"
                      [class.is-invalid]="item.get('productId')?.invalid && item.get('productId')?.touched">
                <option [value]="null">-- Select product --</option>
                <option *ngFor="let p of products" [value]="p.id">
                  {{ p.name }} (Stock: {{ p.stock }})
                </option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label" *ngIf="i === 0">Qty *</label>
              <input type="number" formControlName="quantity" class="form-control" min="1"
                     [class.is-invalid]="item.get('quantity')?.invalid && item.get('quantity')?.touched">
            </div>
            <div class="col-md-1">
              <button type="button" class="btn btn-outline-danger btn-sm w-100"
                      (click)="removeItem(i)" [disabled]="items.length === 1">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
        Create Order
      </button>
      <a routerLink="/orders" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
