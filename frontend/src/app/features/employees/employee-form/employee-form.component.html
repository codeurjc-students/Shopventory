<div class="container py-4" style="max-width:640px">
  <h2 class="mb-4">{{ isEdit ? 'Edit Employee' : 'New Employee' }}</h2>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">First Name *</label>
        <input formControlName="name" class="form-control"
               [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched">
        <div class="invalid-feedback">Required.</div>
      </div>
      <div class="col-md-6">
        <label class="form-label">Surname *</label>
        <input formControlName="surname" class="form-control"
               [class.is-invalid]="form.get('surname')?.invalid && form.get('surname')?.touched">
        <div class="invalid-feedback">Required.</div>
      </div>
      <div class="col-md-8">
        <label class="form-label">Email *</label>
        <input type="email" formControlName="email" class="form-control"
               [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched">
        <div class="invalid-feedback">Valid email required.</div>
      </div>
      <div class="col-md-4">
        <label class="form-label">Phone</label>
        <input formControlName="phone" class="form-control" placeholder="+34...">
      </div>
      <div class="col-md-8">
        <label class="form-label">Position *</label>
        <input formControlName="position" class="form-control"
               [class.is-invalid]="form.get('position')?.invalid && form.get('position')?.touched">
        <div class="invalid-feedback">Required.</div>
      </div>
      <div class="col-md-4">
        <label class="form-label">Hire Date *</label>
        <input type="date" formControlName="hireDate" class="form-control"
               [class.is-invalid]="form.get('hireDate')?.invalid && form.get('hireDate')?.touched">
        <div class="invalid-feedback">Required.</div>
      </div>
    </div>

    <div class="mt-4 d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
        {{ isEdit ? 'Update' : 'Create' }}
      </button>
      <a routerLink="/employees" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
