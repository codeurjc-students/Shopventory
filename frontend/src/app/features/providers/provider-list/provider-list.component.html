<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2><i class="bi bi-truck me-2"></i>Providers</h2>
    <a *ngIf="auth.isAdmin()" routerLink="/providers/new" class="btn btn-primary">
      <i class="bi bi-plus-lg me-1"></i> Add Provider
    </a>
  </div>

  <div class="card border-0 shadow-sm mb-3">
    <div class="card-body">
      <div class="input-group" style="max-width:400px">
        <input type="text" class="form-control" placeholder="Search providers..."
               [(ngModel)]="searchTerm" (keyup.enter)="load()">
        <button class="btn btn-outline-secondary" (click)="load()"><i class="bi bi-search"></i></button>
      </div>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div *ngIf="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>

  <div *ngIf="!loading && page">
    <div class="card border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr><th>Name</th><th>Contact</th><th>Phone</th><th>Types</th><th *ngIf="auth.isAdmin()">Actions</th></tr>
          </thead>
          <tbody>
            <tr *ngFor="let p of page.content">
              <td><strong>{{ p.name }}</strong><br><small class="text-muted">{{ p.email }}</small></td>
              <td>{{ p.contactPerson }}</td>
              <td>{{ p.phoneNumber }}</td>
              <td><span *ngFor="let t of p.types" class="badge bg-secondary me-1">{{ t }}</span></td>
              <td *ngIf="auth.isAdmin()">
                <a [routerLink]="['/providers', p.id, 'edit']" class="btn btn-sm btn-outline-secondary me-1">
                  <i class="bi bi-pencil"></i>
                </a>
                <button class="btn btn-sm btn-outline-danger" (click)="delete(p.id)">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="d-flex justify-content-between align-items-center mt-3">
      <small class="text-muted">{{ page.totalElements }} providers</small>
      <div class="btn-group">
        <button class="btn btn-outline-secondary" (click)="prevPage()" [disabled]="currentPage===0">
          <i class="bi bi-chevron-left"></i> Previous
        </button>
        <button class="btn btn-outline-secondary" (click)="nextPage()" [disabled]="page.last">
          Next <i class="bi bi-chevron-right"></i>
        </button>
      </div>
    </div>
  </div>
</div>
